[build]
  publish = "dist"
  command = "npm run build"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"

[context.production.environment]
  VITE_API_URL = "https://watchparty-youtube.onrender.com"
  VITE_WS_URL = "https://watchparty-youtube.onrender.com"
