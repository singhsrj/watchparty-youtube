services:
  # Backend API + WebSocket server on Render
  - type: web
    name: watchparty-backend
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:socket_app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: watchparty-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://watchpartyt.netlify.app
      - key: SECRET_KEY
        generateValue: true

  # PostgreSQL database
databases:
  - name: watchparty-db
    plan: free
    region: oregon
